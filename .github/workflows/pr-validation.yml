name: CI — Shared PR Quality Validation

on:
  workflow_call:
    secrets:
      GITLEAKS_LICENSE:
        required: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # Uses your local package.json script
      - name: Run TypeScript Type Check
        run: pnpm run typecheck

      - name: Run Linter
        run: pnpm run lint

      - name: Next.js Production Build (Asset Check)
        run: pnpm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Analyze Bundle Size (Native)
        run: |
          echo "### 📦 Next.js JavaScript Bundle Sizes" >> $GITHUB_STEP_SUMMARY
          echo "| Size | File Path |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY

          find .next/static -type f -name "*.js" -exec du -sh {} + | sort -hr | while read size file; do
            echo "| $size | \`$file\` |" >> $GITHUB_STEP_SUMMARY
          done
