name: CI — Shared PR Quality Validation

on:
  workflow_call: # This is the critical line that allows it to be reused

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run TypeScript Type Check
        run: npx tsc --noEmit

      - name: Run Super-Linter
        uses: super-linter/super-linter@v6
        env:
          VALIDATE_ALL_CODEBASE: false
          VALIDATE_TYPESCRIPT_ESLINT: true
          VALIDATE_JAVASCRIPT_ESLINT: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Next.js Production Build (Asset Check)
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Analyze Bundle Size
        uses: ampproject/filesize-action@v2
        with:
          path: ".next/static/**/*.js"
